];

// ===================== 核心逻辑 =====================
const $ = id => document.getElementById(id);
const totalEl = $("total");
const doneEl = $("done");
const rightEl = $("right");
const rateEl = $("rate");
const qNum = $("qNum");
const qText = $("qText");
const optsBox = $("opts");

let currentType = "all";
let questionList = [...fullBank];
let currentIndex = Math.floor(Math.random() * fullBank.length);
let userSelect = [];
let done = 0, right = 0;

totalEl.innerText = fullBank.length;

document.querySelectorAll(".filter button").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".filter button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentType = btn.dataset.type;
        questionList = currentType === "all" ? [...fullBank] : fullBank.filter(q => q.type === currentType);
        currentIndex = Math.floor(Math.random() * questionList.length);
        render();
    }
});

function render() {
    const q = questionList[currentIndex];
    qNum.innerText = `${q.type}｜第${q.id}题`;
    qText.innerText = q.title;
    optsBox.innerHTML = "";
    userSelect = [];

    if (q.type === "单选题" || q.type === "多选题") {
        q.options.forEach(opt => {
            let div = document.createElement("div");
            div.className = "opt";
            div.innerText = opt;
            div.onclick = () => {
                if (q.type === "单选题") {
                    userSelect = [opt];
                    document.querySelectorAll(".opt").forEach(o => o.classList.remove("selected"));
                    div.classList.add("selected");
                } else {
                    if (userSelect.includes(opt)) {
                        userSelect = userSelect.filter(x => x !== opt);
                        div.classList.remove("selected");
                    } else {
                        userSelect.push(opt);
                        div.classList.add("selected");
                    }
                }
            };
            optsBox.appendChild(div);
        });
    } else {
        optsBox.innerHTML = `<div class="answer-box">点击【显示答案】查看</div>`;
    }
}

$("nextBtn").onclick = () => {
    const q = questionList[currentIndex];
    if ((q.type === "单选题" || q.type === "多选题") && userSelect.length > 0) {
        done++;
        const correctArr = q.answer.split(/，|；|,|;/).map(s => s.trim());
        const isRight = userSelect.length === correctArr.length && userSelect.every(x => correctArr.includes(x));
        if (isRight) right++;
        updateScore();
    }
    currentIndex = (currentIndex + 1) % questionList.length;
    render();
};

$("prevBtn").onclick = () => {
    currentIndex = (currentIndex - 1 + questionList.length) % questionList.length;
    render();
};

$("ansBtn").onclick = () => {
    const q = questionList[currentIndex];
    if (q.type === "简答题" || q.type === "论述题") {
        optsBox.innerHTML = `<div class="answer-box"><strong>参考答案：</strong>${q.answer}</div>`;
        done++; updateScore();
    } else {
        document.querySelectorAll(".opt").forEach(o => {
            if (q.answer.includes(o.innerText)) o.classList.add("correct");
            else o.classList.add("wrong");
        });
    }
};

$("resetBtn").onclick = () => {
    done = 0; right = 0; currentIndex = Math.floor(Math.random() * questionList.length);
    updateScore(); render();
};

function updateScore() {
    doneEl.innerText = done;
    rightEl.innerText = right;
    rateEl.innerText = done ? Math.round(right / done * 100) + "%" : "0%";
}

render();
</script>

</html>
