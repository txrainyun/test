            {
                "知识点": "发展对象",
                "题型": "论述题",
                "题目内容": "党组织与发展对象谈话时的基本要求及注意事项有哪些？",
                "选择题可选项/填空问答题得分点": "党组织与发展对象谈话，既要注意原则要求，又要避免过于生硬的方式，使谈话能始终保持心情舒畅的状态，达到促膝谈心和循循善诱的效果。第一，注意适时调整对方的心理状态。谈话时，要注意对方的心理变化，根据需要调整其心理状态，以增强谈话的效果。通常谈话刚开始时，对方有些紧张，这时要设法消除其紧张心理。党组织谈话人除以平等热情的态度对待发展对象外，还不妨和发展对象拉拉家常，使其紧张的情绪放松;也可先列出谈话要点，给发展对象一些思考的时间，然后再开始谈话。第二，因人而异，避免公式化。谈话时，可根据对方的职业、文化程度、年龄、性格的不同而采取不同的谈话方式。和年轻人谈话，可以活泼风趣、富于鼓动性;和年长者谈话，应神态稳重、说理透彻;和知识分子谈话，当力求语言准确、逻辑缜密;和工人谈话，尽可能直截了当、通俗易懂;和干部谈话，须谈吐精练、道理深刻。遇性格外向者，谈话可爽快利落;逢性格内向者，须寻找其兴奋点。第三，注重思想性和政治性。党组织谈话人与发展对象谈话，是世界观、人生观、价值观的挖掘。因此注重思想性、政治性是谈话的本质特征。不仅要求党组织谈话人具有很高的思想层次，也要求发展对象在谈话中要紧扣主题，突出思想性和政治性话题，以此引发其思想深处对所谈内容的认知程度，防止把谈话变成一般的座谈和闲聊。第四，谈话既是考察又是教育。党组织在与发展对象的谈话中，通过考察，如发现发展对象在认识上的差距，可以此作为教育的入口;反过来，通过教育，使对方受到启迪，认识得以升华，便于加深考察。因此，谈话是考察和教育的结合体。第五，突出重点。谈话时应抓住重点，确保每一个话题都有鲜明的针对性，都直接关系到发展对象是否符合党员条件，是否为党组织所认可。",

            {

                "题型": "论述题",
                "题目内容": "对发展对象进行短期集中培训有什么样的意义？",
                "选择题可选项/填空问答题得分点": "第一，短期集中培训是加强发展对象对党的知识学习的重要环节。发展对象在入党积极分子阶段时，虽然党组织已经通过入党积极分子培训班及日常教育等途径对其进行了党的基本知识的教育，但成为发展对象是新党员入党前的关键阶段。他们即将入党，成为真正的党员，因此，非常有必要对他们进行进一步的培训，以提高他们的思想政治素质和理论知识水平，保证新党员发展的质量。第二，短期集中培训是党组织进一步考察发展对象的一个重要措施。党组织在开展短期集中培训的过程中，可以通过发展对象的培训表现、考核情况等对发展对象作进一步考察，考察发展对象共产主义信念是否坚定，对党的基本路线、基本方针和基本政策是否拥护，对党的基本知识是否了解，是否明确作为一名共产党员应当如何学习、工作和生活，是否真正具备党员条件等。第三，短期集中培训是党组织进一步端正发展对象入党动机的有效形式。党组织通过对发展对象短期集中培训，可以深入考察他们的入党动机是否正确，防止把入党动机不纯、一心想借入党捞取好处的人和企图“改造”党的阴谋分子吸收到党内来。同时要进一步端正发展对象的入党动机，帮助 them 提高思想觉悟，不断加强引导、教育，帮助 them 树立立共产主义理想，坚定全心全意为人民服务的宗旨，深化不怕牺牲、甘于奉献，为党的事业奋斗终身的信念。",
                "答案": "第一，短期集中培训是加强发展对象对党的知识学习的重要环节。发展对象在入党积极分子阶段时，虽然党组织已经通过入党积极分子培训班及日常教育等途径对其进行了党的基本知识的教育，但成为发展对象是新党员入党前的关键阶段。他们即将入党，成为真正的党员，因此，非常有必要对他们进行进一步的培训，以提高他们的思想政治素质和理论知识水平，保证新党员发展的质量。第二，短期集中培训是党组织进一步考察发展对象的一个重要措施。党组织在开展短期集中培训的过程中，可以通过发展对象的培训表现、考核情况等对发展对象作进一步考察，考察发展对象共产主义信念是否坚定，对党的基本路线、基本方针和基本政策是否拥护，对党的基本知识是否了解，是否明确作为一名共产党员应当如何学习、工作和生活，是否真正具备党员条件等。第三，短期集中培训是党组织进一步端正发展对象入党动机的有效形式。党组织通过对发展对象短期集中培训，可以深入考察他们的入党动机是否正确，防止把入党动机不纯、一心想借入党捞取好处的人和企图“改造”党的阴谋分子吸收到党内来。同时要进一步端正发展对象的入党动机，帮助 them 提高思想觉悟，不断加强引导、教育，帮助 them 树立立共产主义理想，坚定全心全意为人民服务的宗旨，深化不怕牺牲、甘于奉献，为党的事业奋斗终身的信念。"
            },
            {
                "知识点": "发展对象",
                "题型": "论述题",
                "题目内容": "结合《中共中央关于制定国民经济和社会发展第十五个五年规划纲要（2026-2030年）》与自身实际，谈一谈如何做一名合格党员。",
                "选择题可选项/填空问答题得分点": "",
                "答案": ""
            }
        ];

        // 当前题目索引
        let currentQuestionIndex = 0;
        // 过滤类型
        let currentFilter = 'all';
        // 用户答案记录
        let userAnswers = [];
        // 题目统计
        let stats = {
            total: 0,
            answered: 0,
            correct: 0
        };
        
        // 已处理的题目索引集合，避免重复计分
        let processedQuestions = new Set();
        
        // 初始化应用
        function initApp() {
            // 初始化用户答案数组
            userAnswers = new Array(questionBank.length).fill(null);
            
            // 统计各类题目数量
            stats.total = questionBank.length;
            updateStats();
            
            // 显示第一题
            showQuestion(currentQuestionIndex);
        }
        
        // 更新统计数据
        function updateStats() {
            document.getElementById('total-questions').textContent = stats.total;
            document.getElementById('answered-count').textContent = stats.answered;
            document.getElementById('correct-count').textContent = stats.correct;
            
            const accuracyRate = stats.answered > 0 ? Math.round((stats.correct / stats.answered) * 100) : 0;
            document.getElementById('accuracy-rate').textContent = `${accuracyRate}%`;
        }
        
        // 显示题目
        function showQuestion(index) {
            if (index < 0 || index >= questionBank.length) return;
            
            currentQuestionIndex = index;
            const question = questionBank[index];
            
            // 更新题目编号和内容
            document.getElementById('current-question-num').textContent = index + 1;
            document.getElementById('question-text').innerHTML = question['题目内容'];
            
            // 清空之前的内容
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // 清空反馈区域
            document.getElementById('feedback-area').innerHTML = '';
            
            // 隐藏答案区域
            document.getElementById('answer-section').style.display = 'none';
            
            // 根据题目类型显示选项
            if (question['题型'] === '单选题') {
                // 解析选项
                const options = question['选择题可选项/填空问答题得分点'].split(';');
                
                options.forEach((option, i) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.innerHTML = `
                        <input type="radio" name="single-choice-${currentQuestionIndex}" id="option${i}" value="${String.fromCharCode(65 + i)}">
                        <label for="option${i}">${option}</label>
                    `;
                    
                    // 如果用户已作答，选中对应选项
                    if (userAnswers[currentQuestionIndex] !== null && userAnswers[currentQuestionIndex] === String.fromCharCode(65 + i)) {
                        optionDiv.querySelector(`input[value="${String.fromCharCode(65 + i)}"]`).checked = true;
                        optionDiv.classList.add('selected');
                    }
                    
                    optionDiv.addEventListener('click', () => {
                        // 移除所有选项的选中状态
                        document.querySelectorAll('.option').forEach(opt => {
                            opt.classList.remove('selected');
                        });
                        
                        // 添加选中状态
                        optionDiv.classList.add('selected');
                        
                        // 记录用户答案
                        userAnswers[currentQuestionIndex] = String.fromCharCode(65 + i);
                        
                        // 单选题选择后直接显示答案和判断结果
                        setTimeout(() => {
                            showAnswer();
                            
                            // 更新统计（如果尚未处理过）
                            if (!processedQuestions.has(currentQuestionIndex)) {
                                processedQuestions.add(currentQuestionIndex);
                                stats.answered++;
                                
                                // 检查答案是否正确
                                if (userAnswers[currentQuestionIndex] === question['答案']) {
                                    stats.correct++;
                                }
                                
                                updateStats();
                            }
                        }, 100); // 延迟执行，让用户看到选择效果
                    });
                    
                    optionsContainer.appendChild(optionDiv);
                });
                
                // 隐藏显示答案按钮（因为单选题会自动显示）
                document.getElementById('show-answer-btn').style.display = 'none';
            } else if (question['题型'] === '多选题') {
                // 解析选项
                const options = question['选择题可选项/填空问答题得分点'].split('<br>');
                
                options.forEach((option, i) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option multiple-choice';
                    optionDiv.innerHTML = `
                        <input type="checkbox" id="option${i}" value="${String.fromCharCode(65 + i)}">
                        <label for="option${i}">${option}</label>
                    `;
                    
                    optionDiv.addEventListener('change', () => {
                        // 获取所有选中的选项
                        const selectedOptions = [];
                        document.querySelectorAll('#options-container input[type="checkbox"]:checked').forEach(checkbox => {
                            selectedOptions.push(checkbox.value);
                        });
                        
                        // 记录用户答案
                        userAnswers[currentQuestionIndex] = selectedOptions.join(',');
                    });
                    
                    optionsContainer.appendChild(optionDiv);
                });
                
                // 如果用户已作答，选中对应选项
                if (userAnswers[currentQuestionIndex]) {
                    const selectedValues = userAnswers[currentQuestionIndex].split(',');
                    selectedValues.forEach(value => {
                        const checkbox = document.querySelector(`#options-container input[value="${value.trim()}"]`);
                        if (checkbox) {
                            checkbox.checked = true;
                            checkbox.parentElement.classList.add('selected');
                        }
                    });
                }
                
                // 显示显示答案按钮
                document.getElementById('show-answer-btn').style.display = 'inline-block';
            } else if (question['题型'] === '填空题') {
                // 填空题
                const fillBlankInput = document.createElement('input');
                fillBlankInput.type = 'text';
                fillBlankInput.className = 'fill-blank';
                fillBlankInput.placeholder = '请输入答案';
                
                if (userAnswers[currentQuestionIndex] !== null) {
                    fillBlankInput.value = userAnswers[currentQuestionIndex];
                }
                
                fillBlankInput.addEventListener('input', () => {
                    userAnswers[currentQuestionIndex] = fillBlankInput.value;
                    
                    // 更新统计（如果尚未处理过且有输入）
                    if (fillBlankInput.value.trim() !== '' && !processedQuestions.has(currentQuestionIndex)) {
                        processedQuestions.add(currentQuestionIndex);
                        stats.answered++;
                        
                        // 检查答案是否正确（这里简化处理，实际可能需要模糊匹配）
                        if (normalizeText(fillBlankInput.value) === normalizeText(question['答案'])) {
                            stats.correct++;
                        }
                        
                        updateStats();
                    }
                });
                
                optionsContainer.appendChild(fillBlankInput);
                
                // 显示显示答案按钮
                document.getElementById('show-answer-btn').style.display = 'inline-block';
            } else if (question['题型'] === '简答题' || question['题型'] === '论述题') {
                // 简答题或论述题
                const answerTextArea = document.createElement('textarea');
                answerTextArea.className = 'short-answer';
                answerTextArea.placeholder = '请输入您的答案';
                
                if (userAnswers[currentQuestionIndex] !== null) {
                    answerTextArea.value = userAnswers[currentQuestionIndex];
                }
                
                answerTextArea.addEventListener('input', () => {
                    userAnswers[currentQuestionIndex] = answerTextArea.value;
                    
                    // 对于主观题，暂时不计入统计，但标记为已答
                    if (answerTextArea.value.trim() !== '' && !processedQuestions.has(currentQuestionIndex)) {
                        processedQuestions.add(currentQuestionIndex);
                        stats.answered++;
                        updateStats();
                    }
                });
                
                optionsContainer.appendChild(answerTextArea);
                
                // 显示显示答案按钮
                document.getElementById('show-answer-btn').style.display = 'inline-block';
            }
            
            // 更新导航按钮状态
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            document.getElementById('next-btn').disabled = currentQuestionIndex === questionBank.length - 1;
        }
        
        // 标准化文本用于比较（去除多余空格、换行符等）
        function normalizeText(text) {
            return text.toString().trim().toLowerCase().replace(/\s+/g, '');
        }
        
        // 显示答案
        function showAnswer() {
            const question = questionBank[currentQuestionIndex];
            document.getElementById('answer-content').textContent = question['答案'];
            document.getElementById('answer-section').style.display = 'block';
            
            // 创建反馈区域
            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.innerHTML = '';
            
            if (question['题型'] === '单选题') {
                // 单选题已经在选择时处理了
                const isCorrect = normalizeText(userAnswers[currentQuestionIndex]) === normalizeText(question['答案']);
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
                feedbackDiv.textContent = isCorrect ? '回答正确！' : '回答错误！';
                feedbackArea.appendChild(feedbackDiv);
                
                // 高亮选项
                const options = document.querySelectorAll('.option');
                options.forEach((option, i) => {
                    const optionValue = String.fromCharCode(65 + i);
                    option.classList.remove('correct', 'incorrect');
                    
                    if (normalizeText(optionValue) === normalizeText(question['答案'])) {
                        option.classList.add('correct');
                    } else if (normalizeText(userAnswers[currentQuestionIndex]) === normalizeText(optionValue)) {
                        option.classList.add('incorrect');
                    }
                });
            } else if (question['题型'] === '多选题') {
                // 多选题判断正误
                if (userAnswers[currentQuestionIndex] !== null) {
                    // 标准化答案字符串以便比较
                    const correctAnswer = question['答案'].split(',').map(item => normalizeText(item)).sort();
                    const userAnswer = userAnswers[currentQuestionIndex].split(',').map(item => normalizeText(item)).sort();
                    const isCorrect = JSON.stringify(correctAnswer) === JSON.stringify(userAnswer);
                    
                    const feedbackDiv = document.createElement('div');
                    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
                    feedbackDiv.textContent = isCorrect ? '回答正确！' : '回答错误！';
                    feedbackArea.appendChild(feedbackDiv);
                    
                    // 更新统计（如果尚未处理过）
                    if (!processedQuestions.has(currentQuestionIndex)) {
                        processedQuestions.add(currentQuestionIndex);
                        stats.answered++;
                        
                        if (isCorrect) {
                            stats.correct++;
                        }
                        
                        updateStats();
                    }
                    
                    // 高亮选项
                    const options = document.querySelectorAll('.option');
                    options.forEach((option, i) => {
                        const optionValue = String.fromCharCode(65 + i);
                        option.classList.remove('correct', 'incorrect');
                        
                        if (correctAnswer.includes(normalizeText(optionValue))) {
                            option.classList.add('correct');
                        } else if (userAnswer.includes(normalizeText(optionValue))) {
                            option.classList.add('incorrect');
                        }
                    });
                }
            } else {
                // 其他题型只显示答案
            }
        }
        
        // 下一题
        function nextQuestion() {
            if (currentQuestionIndex < questionBank.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }
        
        // 上一题
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }
        
        // 跳转到指定题目
        function jumpToQuestion() {
            const input = document.getElementById('jump-input');
            const num = parseInt(input.value);
            
            if (num >= 1 && num <= questionBank.length) {
                showQuestion(num - 1);
                input.value = '';
            } else {
                alert('请输入有效的题目编号！');
            }
        }
        
        // 过滤题目
        function filterQuestions(filterType) {
            currentFilter = filterType;
            
            // 更新按钮状态
            document.querySelectorAll('.category-buttons .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            event.target.classList.add('active');
            
            // 这里可以根据过滤类型显示特定题目
            // 现在我们只显示第一题
            if (filterType === 'all') {
                showQuestion(0);
            } else {
                // 查找第一个符合条件的题目
                for (let i = 0; i < questionBank.length; i++) {
                    if (questionBank[i]['题型'] === filterType) {
                        showQuestion(i);
                        break;
                    }
                }
            }
        }
        
        // 页面加载完成后初始化
        window.onload = initApp;
    </script>
