{"id":162,"type":"简答题","title":"简述正确入党动机的内涵。","answer":"正确的入党动机主要包括三个方面的内容。第一，要有为共产主义和中国特色社会主义事业奋斗终身的坚定信念；第二，要有全心全意为人民服务的思想；第三，要有在生产、工作、学习和社会生活中起先锋模范作用的觉悟。"},
{"id":163,"type":"简答题","title":"简述党员的基本条件。","answer":"党章第二条规定：中国共产党党员是中国工人阶级的有共产主义觉悟的先锋战士。中国共产党党员必须全心全意为人民服务，不惜牺牲个人的一切，为实现共产主义奋斗终身。中国共产党党员永远是劳动人民的普通一员。除了法律和政策规定范围内的个人利益和工作职权以外，所有共产党员都不得谋求任何私利和特权。这个规定，对共产党员的本质特征作了全面准确的概括，是共产党员条件中的核心部分。每个要求入党的同志都要加深对这一段话的理解，懂得共产党员是什么样的人。"},
{"id":164,"type":"简答题","title":"马克思主义中国化的理论成果包括哪些内容？","answer":"马克思主义中国化的理论成果包括毛泽东思想、邓小平理论、三个代表重要思想、科学发展观和习近平新时代中国特色社会主义思想。"},
{"id":165,"type":"简答题","title":"简述习近平新时代中国特色社会主义思想的历史贡献。","answer":"一是开辟了马克思主义新境界；二是开辟了中国特色社会主义新境界；三是开辟了治国理政新境界；四是开辟了管党治党新境界。"},
{"id":166,"type":"简答题","title":"简述两个一百年奋斗目标。","answer":"在中国共产党成立100年时全面建成小康社会，在新中国成立100年时建成富强民主文明和谐的社会主义现代化国家。"},
{"id":167,"type":"简答题","title":"从2035年到本世纪中叶，在基本实现社会主义现代化的基础上，再奋斗15年，建成社会主义现代化强国的目标要求是什么？","answer":"这一阶段的目标要求是：在基本实现社会主义现代化的基础上，我国物质文明、政治文明、精神文明、社会文明、生态文明得到全面提升，建成富强民主文明和谐美丽的社会主义现代化强国，实现国家治理体系和治理能力现代化，成为综合国力和国际影响力领先的国家，全体人民共同富裕基本实现，我国人民将享有更加幸福安康的生活，中华民族将以更加昂扬的姿态屹立于世界民族之林，实现中华民族伟大复兴的中国梦。"},
{"id":168,"type":"简答题","title":"简述党章是党内最高法体现在哪几个方面。","answer":"第一，它是党的整体意志的体现；第二，它是党内的普遍行为规范；第三，它是具有最高权威的党内法规。"},
{"id":169,"type":"简答题","title":"简述党的十九大关于党章修改的主要特点。","answer":"第一，历史必然性和马克思主义政党主动性、创造性的紧密结合；第二，既继承传统又勇于突破创新；第三，更加注重实用性、操作性。"},
{"id":170,"type":"简答题","title":"简述学习践行新党章要做好哪三学。","answer":"第一，要做好对照学，做到真学真懂；第二，要做好考查学，做到真学真考；第三，要做好实践学，做到真学真用。"},
{"id":171,"type":"简答题","title":"简述严肃党内政治生活的意义。","answer":"第一，保持党的先进性和纯洁性的根本要求；第二，保持党的凝聚力和战斗力的重要途径；第三，保持党的公信力和话语权的重要途径；第四，党内政治生活不正常，会使党内腐败横行；第五，党内政治生活不正常，会动摇党的执政地位。"},
{"id":172,"type":"简答题","title":"《关于新形势下党内政治生活的若干准则》针对党内存在的突出问题，从十二个方面对严肃党内政治生活做出规定，简述共包括哪十二个方面。","answer":"第一，坚定理想信念；第二，坚持党的基本路线；第三，坚决维护党中央权威；第四，严明党的政治纪律；第五，保持党同人民群众的血肉联系；第六，坚持民主集中制原则；第七，发扬党内民主和保障党员权利；第八，坚持正确选人用人导向；第九，严格党的组织生活制度；第十，开展批评和自我批评；第十一，加强对权力运行的制约和监督；第十二，保持清正廉洁的政治本色。"},
{"id":173,"type":"简答题","title":"2016年1月29日中共中央政治局会议最早提出四个意识，四个意识指的是什么？","answer":"政治意识；大局意识；核心意识；看齐意识。"},
{"id":174,"type":"简答题","title":"两学一做学习教育要求广大党员做四讲四有的合格党员，四讲四有指的是什么？","answer":"讲政治、有信念；讲规矩、有纪律；讲道德，有品行；讲奉献、有作为。"},
{"id":175,"type":"简答题","title":"党员有哪八项基本义务？","answer":"第一，认真学习马克思列宁主义、毛泽东思想、邓小平理论、三个代表重要思想、科学发展观、习近平新时代中国特色社会主义思想，学习党的路线、方针、政策和决议，学习党的基本知识，学习科学、文化、法律和业务知识，努力提高为人民服务的本领。第二，贯彻执行党的基本路线和各项方针、政策，带头参加改革开放和社会主义现代化建设，带动群众为经济发展和社会进步艰苦奋斗，在生产、工作、学习和社会生活中起先锋模范作用。第三，坚持党和人民的利益高于一切，个人利益服从党和人民的利益，吃苦在前，享受在后，克己奉公，多做贡献。第四，自觉遵守党的纪律，首先是党的政治纪律和政治规矩，模范遵守国家的法律法规，严格保守党和国家的秘密，执行党的决定，服从组织分配，积极完成党的任务。第五，维护党的团结和统一，对党忠诚老实，言行一致，坚决反对一切派别组织和小集团活动，反对阳奉阴违的两面派行为和一切阴谋诡计。第六，切实开展批评和自我批评，勇于揭露和纠正违反党的原则的言行和工作中的缺点、错误，坚决同消极腐败现象作斗争。第七，密切联系群众，向群众宣传党的主张，遇事同群众商量，及时向党反映群众的意见和要求，维护群众的正当利益。第八，发扬社会主义新风尚，带头实践社会主义核心价值观和社会主义荣辱观，提倡共产主义道德，弘扬中华民族传统美德，为了保护国家和人民的利益，在一切困难和危险的时刻挺身而出，英勇斗争，不怕牺牲。"},
{"id":176,"type":"简答题","title":"党员有哪八项基本权利？","answer":"第一，参加党的有关会议，阅读党的有关文件，接受党的教育和培训。第二，在党的会议上和党报党刊上，参加关于党的政策问题的讨论。第三，对党的工作提出建议和倡议。第四，在党的会议上有根据地批评党的任何组织和任何党员，向党负责地揭发、检举党的任何组织和任何党员违法乱纪的事实，要求处分违法乱纪的党员，要求罢免或撤换不称职的干部。第五，行使表决权、选举权，有被选举权。第六，在党组织讨论决定对党员的党纪处分或作出鉴定时，本人有权参加和进行申辩，其他党员可以为他作证和辩护。第七，对党的决议和政策如有不同意见，在坚决执行的前提下，可以声明保留，并且可以把自己的意见向党的上级组织直至中央提出。第八，向党的上级组织直至中央提出请求、申诉和控告，并要求有关组织给以负责的答复。"},
{"id":177,"type":"简答题","title":"《中国共产党发展党员工作细则》规定怎样才能成为发展对象？","answer":"对经过一年以上培养教育和考察、基本具备党员条件的入党积极分子，在听取党小组、培养联系人、党员和群众意见的基础上，支部委员会讨论同意并报上级党委备案后，可列为发展对象。"},
{"id":178,"type":"简答题","title":"简述发展对象入党前谈话的主要内容。","answer":"第一，发展对象是否对党有正确的认识；第二，发展对象的入党动机和目的是否端正，能否为党的事业奋斗终身，能否全心全意为人民服务；第三，发展对象的政治觉悟是否达到党的要求；第四，发展对象的道德品质和工作态度如何；第五，发展对象对党的基本理论、基本路线、基本方略及基本知识是否基本理解和掌握；第六，发展对象是否能正确认识并改正自己的缺点和不足；第七，发展对象需要向党组织说明的其他重要政治历史问题。"},
{"id":179,"type":"简答题","title":"简述对发展对象政治审查的意义。","answer":"第一，对发展对象进行政治审查，是保持党的先进性和纯洁性的重要举措；第二，对发展对象进行政治审查，是发展党员必须履行的手续之一；第三，对发展对象进行政治审查，是保证新党员政治素质的必然要求；第四，对发展对象进行政治审查，是防止三种人混进党内来的重要一环。"},
{"id":180,"type":"简答题","title":"简述入党介绍人的主要任务。","answer":"第一，向发展对象解释党的纲领、章程，说明党员的条件、义务和权利；第二，认真了解发展对象的入党动机、政治觉悟、道德品质、工作经历、现实表现等情况，如实向党组织汇报；第三，指导发展对象填写《中国共产党入党志愿书》，并认真填写自己的意见；第四，向支部大会负责地介绍发展对象的情况；第五，发展对象批准为预备党员后，继续对其进行教育帮助。"},
{"id":181,"type":"简答题","title":"入党誓词","answer":"我志愿加入中国共产党，拥护党的纲领，遵守党的章程，履行党员义务，执行党的决定，严守党的纪律，保守党的秘密，对党忠诚，积极工作，为共产主义奋斗终身，随时准备为党和人民牺牲一切，永不叛党。"},

// ===================== 论述题 =====================
{"id":182,"type":"论述题","title":"大学生党员发展对象如何端正自己的入党动机？","answer":"第一，加强理论修养，奠定树立正确入党动机的思想基础。大学生党员发展对象要认真学习马克思列宁主义、毛泽东思想、邓小平理论、三个代表重要思想、科学发展观和习近平新时代中国特色社会主义思想。第二，要通过实践锻炼，在火热的生活中端正入党动机。大学生党员发展对象必须在实践中不断用切身体验来深化对党的认识，从而进一步端正自己的入党动机。要通过积极投身于建设中国特色社会主义伟大事业的实践，来加深对共产主义事业的认识，强化正确的入党动机。第三，用正确的入党动机克服不正确的入党动机。人的思想活动是比较复杂的，在争取入党的过程中，一个人的入党动机往往既有正确的成分，也会掺杂一些不正确的东西。只不过有些同志入党动机正确的成分是主要的，不正确的成分是次要的；而有些同志则相反。这就要求申请入党的同志主动向党组织靠拢，争取党组织对自己的帮助，通过接受党的教育、实际锻炼和自我思想改造，发扬积极因素，克服消极因素，把不正确的动机改正过来。第四，端正入党动机，不是入党前一时的问题，而是一辈子的事情。每个要求入党的同志都应引以为鉴，不论组织上是否入了党，都应做到首先在思想上真正入党；而且要长期地注意检查自己入党的动机，克服那些不正确的思想，决不能入党前拼命干，入党后松一半。"},
{"id":183,"type":"论述题","title":"习近平新时代中国特色社会主义思想具有怎样的理论特色？","answer":"一是坚守真理、传承文明的继承性。习近平新时代中国特色社会主义思想始终坚持马克思主义立场观点方法，处处闪耀着马克思主义真理光辉。这一思想继承和吸收中华民族优秀传统文化，蕴含着丰富的中华民族价值共识、精神追求、政治智慧和历史经验。这一思想充分吸收人类文明有益成果，积极借鉴别国治国理政经验，展现出宽广视野和博大胸怀。二是与时俱进、引领未来的创新性。习近平新时代中国特色社会主义思想以我们正在做的事情为中心，直面前进道路上的各种风险和挑战、困难和矛盾，着力探索破解难题、推进事业发展的新理念新思想新战略，具有强烈的时代气息和现实针对性。这一思想洞察时代风云，把握时代大势，站在人类发展前沿引领时代潮流，积极探索关系人类前途命运的重大问题，为解决人类面临的共性问题、应对当今世界面临的全球性挑战贡献了中国智慧和中国方案。三是不忘初心、践行宗旨的人民性。习近平新时代中国特色社会主义思想坚持人民主体地位，尊重人民首创精神，注重从人民群众中汲取力量和智慧，时刻关注人民群众的喜怒哀乐，体现了亲民、爱民、忧民、为民的真挚情怀。这一思想坚持把人民对美好生活的向往作为奋斗目标，把让老百姓过上好日子作为全部工作的出发点和落脚点，充分体现了立党为公、执政为民的执政理念，体现了人民至上的价值追求，体现了为中国人民谋幸福、为中华民族谋复兴的使命担当。四是实事求是、把握规律的科学性。习近平新时代中国特色社会主义思想立足社会主义初级阶段这个最大实际，准确把握我国发展的阶段性特征和社会主要矛盾的新变化，坚持一切从实际出发，勇于破除一切不合时宜的思想观念和体制机制弊端。这一思想积极探索规律、自觉遵循规律，按照客观规律要求谋划事业发展，正确处理尊重客观规律与发挥主观能动性的关系，使我们党对共产党执政规律、社会主义建设规律和人类社会发展规律的认识达到新的高度。"},
{"id":184,"type":"论述题","title":"如何深入学习贯彻习近平新时代中国特色社会主义思想？","answer":"首先，要充分认识用习近平新时代中国特色社会主义思想武装全党的重大意义。坚持以科学理论引领、用科学理论武装，是我们党永葆先进性纯洁性的根本保证。用习近平新时代中国特色社会主义思想武装起来，是新时代坚持和发展中国特色社会主义的必然要求，是实现两个一百年奋斗目标、实现中华民族伟大复兴中国梦的必然要求，是坚持和加强党的全面领导、推动全面从严治党向纵深发展的必然要求，是建设高素质专业化干部队伍、全面增强执政本领的必然要求。其次，要深刻把握习近平新时代中国特色社会主义思想的精髓。深入学习贯彻习近平新时代中国特色社会主义思想，要在领会基本内容的同时，深入理解和掌握贯穿其中的精髓要义。习近平新时代中国特色社会主义思想的精髓，就是为人民谋幸福、为民族谋复兴、为世界作贡献。这一思想精髓集中反映了当代中国共产党人的人民立场、民族抱负、世界责任。为人民谋幸福，是中国共产党毫不动摇的初心；为民族谋复兴，是中国共产党应运而生就肩负起的伟大历史使命；为世界作贡献，是中国共产党为人类谋和平、谋发展的使命担当。最后，要大力推动习近平新时代中国特色社会主义思想学习教育不断取得新成效。为学之实，固在践履。理论的价值在于指导实践，学习的目的全在于运用。深入开展习近平新时代中国特色社会主义思想学习教育，要大力弘扬理论联系实际的优良学风，教育引导广大党员干部把自己摆进去、把职责摆进去、把工作摆进去，真正做到学思用贯通、知信行统一，把学习教育成效真正体现在提高政治站位、坚定维护核心上，体现在增强过硬本领、推动实际工作上，体现在凝心聚力、不懈奋斗上，更加自觉地以习近平新时代中国特色社会主义思想为指导，拥抱新时代、展现新作为。"},
{"id":185,"type":"论述题","title":"中华民族伟大复兴中国梦的提出有什么样的重大意义？","answer":"中华民族伟大复兴的中国梦，反映了近代以来一代又一代中国人的美好愿景，进一步揭示了中华民族的历史命运和当代中国的发展走向，指明了全党全国各族人民共同的奋斗目标。中华民族伟大复兴的中国梦一经提出，就产生了强大的号召力和感染力，极大地激发人民群众实现中华民族伟大复兴的内心渴望和高涨热情，就成为中国走向未来的鲜明指引，成为聚合中国强起来的磅礴力量的一面精神旗帜。党的十八大以来，正是在中国梦的激励下，在中国共产党的正确领导下，中国特色社会主义事业取得了一个又一个举世瞩目的历史性成就，中国人民的获得感、幸福感进一步增强，中华民族以更加昂扬向上的精神面貌屹立于世界民族之林。现在，当更接近中华民族伟大复兴目标的时候，我们正以更加自信的姿态去奋斗。 中华民族伟大复兴的中国梦对世界发展具有深远的影响。习近平总书记指出：中国梦要实现国家富强、民族复兴、人民幸福，是和平、发展、合作、共赢的梦，与包括美国梦在内的世界各国人民的美好梦想相通。国际金融危机爆发以来，中国为世界各国带来了发展机会和动力，已成为助推世界经济复苏的主引擎，对世界经济的贡献越来越大，在推动中国自身发展的同时，也拉动了世界各国的发展。现在，在实现中华民族伟大复兴中国梦的进程中所形成的中国经验，也为解决人类面临的共同难题提供了中国方案和中国智慧。中国坚持和平发展道路，积极构建人类命运共同体，履行好中国维护世界和平的国际义务。可以说，中华民族伟大复兴不仅惠及中国人民，而且惠及世界人民。"},
{"id":186,"type":"论述题","title":"党的十九大党章有哪些新变化？","answer":"党的十九大党章的新变化可以从四个主要方面来分析，其他修改都是这四个主要方面修改的具体化和补充。第一，党章对党领导的伟大事业的历史方位作出新定位：中国特色社会主义进入新时代。第二，修改党章最大的创新和亮点是把习近平新时代中国特色社会主义思想确立为指导思想。第三，新时代需要对建设中国特色社会主义提出新方略，作出新部署。第四，完成新时代的新任务迫切需要加强和改进党的领导。"},
{"id":187,"type":"论述题","title":"大学生党员发展对象学习践行新党章如何做好实践学，做到真学真用？","answer":"学党章要开动脑筋，多思多想，使之内化于心、外化于行，做到以学促知、知行合一。习近平总书记指出：学习和思考、学习和实践是相辅相成的，正所谓‘学而不思则罔，思而不学则殆’。你脑子里装着问题了，想解决问题了，想把问题解决好了，就会去学习，就会自觉去学习。学习要联系实际学，按照两学一做中做这个关键去积极实践，用实践检验学习、促进学习，达到学以立德、学以增智、学以笃行的效果，实现学用相长的目的。总之，党员要时时以党章为遵循，深学细研其中所蕴含的立场观点，多照一照自我，多量一量自身，经常除去思想灰尘，永葆共产党员的先进性。"},
{"id":188,"type":"论述题","title":"大学生党员发展对象学习践行新党章如何做好对照学，做到真学真懂？","answer":"没有比较就没有鉴别。原原本本学党章是对党员和党员干部进行两学一做学习教育的基本要求。学是基础，是前提，但不能将学简单地理解为读一遍，或是抄一遍。虽然读抄都是学习的形式，但这种形式只是起到走马观花蜻蜓点水的作用，很难内化于心。党章字字珠玑、章章重要，要做到真学真懂、学深学透。习近平总书记强调：学习党章不仅要原原本本学、反反复复学，做到知其然，而且要联系实际学、深入思考学，做到知其所以然。对此，在学习党章的过程中要循序渐进，不能一蹴而就，要结合历次党章的修改，细细品读、如琢如磨，如此才能去了解党情党史，感悟党的发展壮大，感悟时代前进的步伐，才能更好地学党章、知党史、悟党情、感党恩；更好地敬仰党章、尊崇党章、践行党章，发挥出党章党的总规矩根本大法行动指南的作用。"},
{"id":189,"type":"论述题","title":"如何保持党同人民群众的血肉联系？","answer":"人民立场是党的根本政治立场，人民群众是党的力量源泉。我们党来自人民，失去人民拥护和支持，党就会失去根基。必须把坚持全心全意为人民服务的根本宗旨、保持党同人民群众的血肉联系作为加强和规范党内政治生活的根本要求。第一，全党必须牢固树立人民群众是历史创造者的历史唯物主义观点，站稳群众立场，增进群众感情；第二，全党必须坚决反对形式主义、官僚主义、享乐主义和奢靡之风，领导干部特别是高级干部要以身作则。第三，党的各级组织、全体党员特别是领导干部必须提高做群众工作能力，既服务群众又带领群众坚定不移贯彻落实党的理论和路线方针政策，把党的主张变为群众的自觉行动，引领群众听党话、跟党走。第四，坚持领导干部调查研究、定期接待群众来访、同干部群众谈心、群众满意度测评等制度。第五，党员、干部必须顾全大局，自觉维护社会和谐稳定，遇到涉及自身利益和局部利益的问题应该通过正常渠道向上级反映，积极主动做好化解社会矛盾、防控社会风险工作，不准组织、参与、纵容扰乱社会秩序的非法活动。"},
{"id":190,"type":"论述题","title":"纯洁性和先进性的关系是怎样的？","answer":"先进性和纯洁性贯穿于党的性质、宗旨、任务和全部工作中，体现在各级党组织和全体党员的实际行动上。习近平总书记指出：党的纯洁性同党的先进性相辅相成、密不可分。纯洁性是先进性的前提和基础，先进性是纯洁性的体现和保证，二者在本质上是一致的。两者的关系体现在这几点上：一是纯洁性是保持和发展党的先进性的前提和基础；二是党的先进性是纯洁性的体现和保证；三是党的先进性和纯洁性在本质上是内在统一的。先进性和纯洁性是马克思主义政党的力量所在、发展所托，更是马克思主义执政党的执政所依、生命所系。保持党的先进性和纯洁性是党的建设一项长期而又常新的战略任务，贯穿于党的发展全过程。习近平总书记指出：保持、发展先进性和纯洁性始终是马克思主义政党根本的思想政治任务，关系党的生死存亡和前途命运。"},
{"id":191,"type":"论述题","title":"如何严格管理党员干部？","answer":"党员干部越是位高权重，越要受到严格管理和监督。首先，抓早抓小抓预防。从严管理干部，功夫要下在平时，严在早、严在小、严在预防上，把干部身上出现的问题消灭在萌芽状态。其次，敢于动真碰硬。敢于板起面孔来批评，对违反党的原则的人和事不留情面，对工作不力和失职渎职的干部不姑息迁就，对出了问题的干部不包庇袒护，严肃处理不守规矩不在状态的干部。再次，直面突出问题。解决好为官不易为官不为的突出问题，搞好正面引导、加强责任追究。最后，强化监督。把上级监督、同级领导班子监督、下级监督有机结合起来，把党内监督与群众监督、媒体监督有机结合起来，让各种违纪违法行为无处遁形。把严肃党内政治生活作为加强干部日常监督的重要抓手，把领导干部民主生活会作为领导班子和领导干部解决自身问题的平台。"},
{"id":192,"type":"论述题","title":"大学生党员如何讲奉献、有作为，勤勉担当尽责，做到履责合格？","answer":"中国共产党具有最讲奉献、最讲牺牲的政治品格。履职尽责、担当奉献，是党员职责所在。要时刻不忘党员身份和责任，始终保持干事创业、开拓进取的精气神，把毕生精力乃至生命奉献给党。要把群众安危冷暖装在心里，自觉服务群众，把群众工作做实做深做细做透，着力解决关系群众切身利益的问题，努力为人民群众谋福祉。要处理好公与私、义与利、苦与乐的关系，爱岗敬业、履职尽责，勇挑重担、不负重托，干在实处、走在前列，不忘初心、继续前进，为全面建设社会主义现代化国家和实现中华民族伟大复兴的中国梦贡献力量。"},
{"id":193,"type":"论述题","title":"大学生党员如何自觉履行党员义务？","answer":"首先，加强学习，不断提高履行党员义务的自觉性。大学生党员要认真学习马克思列宁主义、毛泽东思想、邓小平理论、三个代表重要思想、科学发展观和习近平新时代中国特色社会主义思想，要认真学习科学文化和业务知识。其次，努力践行全心全意为人民服务的宗旨。大学生党员要在建设有中国特色社会主义的伟大实践中切实履行党员义务；要吃苦在前，享受在后，克己奉公，要把党和人民的利益放在首位，看得高于一切；要密切联系人民群众，要积极向群众宣传党的路线、方针和政策，善于把党的主张变成群众的自觉行动；做到遇事同群众商量，虚心向群众请教，及时向党反映群众的意见和要求，维护群众的正当利益，勇于同各种损害群众利益的行为作斗争。最后，增强组织纪律观念，自觉接受党组织的教育、帮助和监督。大学生党员要积极参加组织生活和党内各种会议，认真阅读党的文件和党报党刊，要经常向党组织汇报思想和工作，以争取党组织的教育和指导，要积极开展自我批评，勇于纠正自己的错误。"},
{"id":194,"type":"论述题","title":"大学生党员在行使党员权利的过程中需要注意什么？","answer":"第一，要坚持在党的纪律面前人人平等的原则。每个党员不论职务高低、党龄长短、贡献大小，都不得享有超越党章赋予党员八项权利以外的任何特权。第二，党员要正确行使和保护好自己的权利。要正确行使权利，就应该熟知各项权利的具体内容，掌握行使各项权利的具体要求；了解和掌握行使权利的程序或方式；行使权利要从党的原则和利益出发；在行使自身权利的同时，注意不要侵犯其他党员的权利；当自己的权利受到侵犯时，要依照有关规定请求党组织的帮助和保护。第三，要解决好不能正确行使权利的问题。有些党员重视自己的权利，但不能正确行使权利，提建议从个人利益出发、行使表决权不坚持原则、批评时捕风捉影等。这样行使权利，不仅没有发挥党员应有的作用，还会给党的事业带来不良影响。此外，在党内生活中，有的党员不珍惜自己的权利，不愿意参加党的组织生活、不愿意发表自己的意见、不敢坚持原则等。对这些错误的思想和行为都应当加以纠正。"},
{"id":195,"type":"论述题","title":"党组织与发展对象谈话时的基本要求及注意事项有哪些？","answer":"党组织与发展对象谈话，既要注意原则要求，又要避免过于生硬的方式，使谈话能始终保持心情舒畅的状态，达到促膝谈心和循循善诱的效果。第一，注意适时调整对方的心理状态。谈话时，要注意对方的心理变化，根据需要调整其心理状态，以增强谈话的效果。通常谈话刚开始时，对方有些紧张，这时要设法消除其紧张心理。党组织谈话人除以平等热情的态度对待发展对象外，还不妨和发展对象拉拉家常，使其紧张的情绪放松;也可先列出谈话要点，给发展对象一些思考的时间，然后再开始谈话。第二，因人而异，避免公式化。谈话时，可根据对方的职业、文化程度、年龄、性格的不同而采取不同的谈话方式。和年轻人谈话，可以活泼风趣、富于鼓动性;和年长者谈话，应神态稳重、说理透彻;和知识分子谈话，当力求语言准确、逻辑缜密;和工人谈话，尽可能直截了当、通俗易懂;和干部谈话，须谈吐精练、道理深刻。遇性格外向者，谈话可爽快利落;逢性格内向者，须寻找其兴奋点。第三，注重思想性和政治性。党组织谈话人与发展对象谈话，是世界观、人生观、价值观的挖掘。因此注重思想性、政治性是谈话的本质特征。不仅要求党组织谈话人具有很高的思想层次，也要求发展对象在谈话中要紧扣主题，突出思想性和政治性话题，以此引发其思想深处对所谈内容的认知程度，防止把谈话变成一般的座谈和闲聊。第四，谈话既是考察又是教育。党组织在与发展对象的谈话中，通过考察，如发现发展对象在认识上的差距，可以此作为教育的入口;反过来，通过教育，使对方受到启迪，认识得以升华，便于加深考察。因此，谈话是考察和教育的结合体。第五，突出重点。谈话时应抓住重点，确保每一个话题都有鲜明的针对性，都直接关系到发展对象是否符合党员条件，是否为党组织所认可。"},
{"id":196,"type":"论述题","title":"对发展对象进行短期集中培训有什么样的意义？","answer":"第一，短期集中培训是加强发展对象对党的知识学习的重要环节。发展对象在入党积极分子阶段时，虽然党组织已经通过入党积极分子培训班及日常教育等途径对其进行了党的基本知识的教育，但成为发展对象是新党员入党前的关键阶段。他们即将入党，成为真正的党员，因此，非常有必要对他们进行进一步的培训，以提高他们的思想政治素质和理论知识水平，保证新党员发展的质量。第二，短期集中培训是党组织进一步考察发展对象的一个重要措施。党组织在开展短期集中培训的过程中，可以通过发展对象的培训表现、考核情况等对发展对象作进一步考察，考察发展对象共产主义信念是否坚定，对党的基本路线、基本方针和基本政策是否拥护，对党的基本知识是否了解，是否明确作为一名共产党员应当如何学习、工作和生活，是否真正具备党员条件等。第三，短期集中培训是党组织进一步端正发展对象入党动机的有效形式。党组织通过对发展对象短期集中培训，可以深入考察他们的入党动机是否正确，防止把入党动机不纯、一心想借入党捞取好处的人和企图改造党的阴谋分子吸收到党内来。同时要进一步端正发展对象的入党动机，帮助 them提高思想觉悟，不断加强引导、教育，帮助 them牢固树立共产主义理想，坚定全心全意为人民服务的宗旨，深化不怕牺牲、甘于奉献，为党的事业奋斗终身的信念。"}
];

// ===================== 核心逻辑 =====================
const $ = id => document.getElementById(id);
const totalEl = $("total");
const doneEl = $("done");
const rightEl = $("right");
const rateEl = $("rate");
const qNum = $("qNum");
const qText = $("qText");
const optsBox = $("opts");

let currentType = "all";
let questionList = [...fullBank];
let currentIndex = Math.floor(Math.random() * fullBank.length);
let userSelect = [];
let done = 0, right = 0;

totalEl.innerText = fullBank.length;

document.querySelectorAll(".filter button").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".filter button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentType = btn.dataset.type;
        questionList = currentType === "all" ? [...fullBank] : fullBank.filter(q => q.type === currentType);
        currentIndex = Math.floor(Math.random() * questionList.length);
        render();
    }
});

function render() {
    const q = questionList[currentIndex];
    qNum.innerText = `${q.type}｜第${q.id}题`;
    qText.innerText = q.title;
    optsBox.innerHTML = "";
    userSelect = [];

    if (q.type === "单选题" || q.type === "多选题") {
        q.options.forEach(opt => {
            let div = document.createElement("div");
            div.className = "opt";
            div.innerText = opt;
            div.onclick = () => {
                if (q.type === "单选题") {
                    userSelect = [opt];
                    document.querySelectorAll(".opt").forEach(o => o.classList.remove("selected"));
                    div.classList.add("selected");
                } else {
                    if (userSelect.includes(opt)) {
                        userSelect = userSelect.filter(x => x !== opt);
                        div.classList.remove("selected");
                    } else {
                        userSelect.push(opt);
                        div.classList.add("selected");
                    }
                }
            };
            optsBox.appendChild(div);
        });
    } else {
        optsBox.innerHTML = `<div class="answer-box">点击【显示答案】查看</div>`;
    }
}

$("nextBtn").onclick = () => {
    const q = questionList[currentIndex];
    if ((q.type === "单选题" || q.type === "多选题") && userSelect.length > 0) {
        done++;
        const correctArr = q.answer.split(/，|；|,|;/).map(s => s.trim());
        const isRight = userSelect.length === correctArr.length && userSelect.every(x => correctArr.includes(x));
        if (isRight) right++;
        updateScore();
    }
    currentIndex = (currentIndex + 1) % questionList.length;
    render();
};

$("prevBtn").onclick = () => {
    currentIndex = (currentIndex - 1 + questionList.length) % questionList.length;
    render();
};

$("ansBtn").onclick = () => {
    const q = questionList[currentIndex];
    if (q.type === "简答题" || q.type === "论述题") {
        optsBox.innerHTML = `<div class="answer-box"><strong>参考答案：</strong>${q.answer}</div>`;
        done++; updateScore();
    } else {
        document.querySelectorAll(".opt").forEach(o => {
            if (q.answer.includes(o.innerText)) o.classList.add("correct");
            else o.classList.add("wrong");
        });
    }
};

$("resetBtn").onclick = () => {
    done = 0; right = 0; currentIndex = Math.floor(Math.random() * questionList.length);
    updateScore(); render();
};

function updateScore() {
    doneEl.innerText = done;
    rightEl.innerText = right;
    rateEl.innerText = done ? Math.round(right / done * 100) + "%" : "0%";
}

render();
</script>
</body>
</html>
